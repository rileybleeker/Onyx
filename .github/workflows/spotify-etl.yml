name: Spotify ETL

on:
  schedule:
    # Hourly at :50 — halves the risk of losing plays to Spotify's 50-track
    # recently-played cap during heavy listening sessions (workout playlists
    # can easily hit 50 plays in 2h; was previously '50 */2 * * *'). Spotify's
    # API only stores the last 50 plays server-side regardless of pagination
    # params, so the cron interval is the only available mitigation. The ETL
    # also emits a 'partial' sync_log status whenever a run returns exactly 50
    # items so /status can surface cap-hit incidents.
    - cron: '50 * * * *'
  workflow_dispatch: # Manual trigger for testing

concurrency:
  group: spotify-etl
  cancel-in-progress: false

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  spotify-etl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install httpx supabase python-dotenv

      - name: Download Spotify tokens from Supabase
        run: python ci_token_helper.py download spotify

      - name: Run Spotify ETL
        run: python spotify_etl.py
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}

      - name: Upload refreshed tokens to Supabase
        # Spotify rotates refresh tokens occasionally — persist whatever's on disk
        if: always()
        run: python ci_token_helper.py upload spotify
