name: Eight Sleep ETL

on:
  schedule:
    # 16:00 UTC = 12:00 PM EDT (noon Eastern during DST, 11 AM EST in winter)
    - cron: '0 16 * * *'
  workflow_dispatch: # Manual trigger for testing

concurrency:
  group: eight-sleep-etl
  cancel-in-progress: false

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  eight-sleep-etl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install httpx supabase python-dotenv
      - name: Run Eight Sleep ETL
        run: python eight_sleep_etl.py --days 7
        env:
          EIGHTSLEEP_EMAIL: ${{ secrets.EIGHTSLEEP_EMAIL }}
          EIGHTSLEEP_PASSWORD: ${{ secrets.EIGHTSLEEP_PASSWORD }}
          EIGHTSLEEP_TIMEZONE: America/New_York
          EIGHTSLEEP_CLIENT_ID: ${{ secrets.EIGHTSLEEP_CLIENT_ID }}
          EIGHTSLEEP_CLIENT_SECRET: ${{ secrets.EIGHTSLEEP_CLIENT_SECRET }}
